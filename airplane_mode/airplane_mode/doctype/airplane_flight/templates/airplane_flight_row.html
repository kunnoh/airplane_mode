<div>
	<strong>{{ (title or name) |e }}</strong>
	<p>
		<strong>{{source_airport_code}} -> {{destination_airport_code}}</strong>
		<span>| {{frappe.utils.format_date(date_of_departure, "d MMMM, YYYY")}}</span>
		<span>| {{time_of_departure}}</span>
		<span>| {{frappe.utils.format_duration(duration or 0, hide_days=True)}}</span>
		<a href="/{{ route |e }}" class="btn btn-info">flight details</a>
	</p>

</div>
